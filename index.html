<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说人物关系图谱</title>
<script src="https://unpkg.com/vis-data@7.1.9/peer/umd/vis-data.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/peer/umd/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1119;--surface:#1a1d2e;--border:#2a2d3e;
  --text:#e0e0e0;--text-dim:#888;--accent:#f0c040;
  --shu:#e74c3c;--wei:#3498db;--wu:#2ecc71;--han:#9b59b6;--jin:#e67e22;--other:#666;
  --danger:#ff4757;--shadow:0 4px 24px rgba(0,0,0,.5);
}
body{font-family:"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}

/* Header */
#header{position:absolute;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:12px;padding:12px 20px;background:linear-gradient(180deg,rgba(15,17,25,.98) 60%,rgba(15,17,25,0));pointer-events:none}
#header>*{pointer-events:auto}
#logo{font-size:22px;font-weight:700;color:var(--accent);white-space:nowrap;letter-spacing:1px}
#search-wrap{flex:1;max-width:480px;position:relative}
#search-input{width:100%;padding:10px 44px 10px 16px;border-radius:24px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text-dim)}
#voice-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:18px;transition:color .2s;display:flex;align-items:center;justify-content:center}
#voice-btn:hover{color:var(--accent)}
#voice-btn.listening{color:var(--danger);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#legend{display:flex;gap:14px;font-size:12px;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#generate-btn{padding:6px 16px;border-radius:18px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;cursor:pointer;transition:all .2s;margin-left:8px;white-space:nowrap}
#generate-btn:hover{background:rgba(240,192,64,.12)}
#export-btn{background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:16px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
#export-btn:hover{color:var(--accent);border-color:var(--accent)}

/* Graph */
#graph-container{position:absolute;top:0;left:0;right:0;bottom:80px;z-index:1}

/* Timeline */
#timeline{position:absolute;bottom:0;left:0;right:0;height:80px;z-index:100;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;overflow-x:auto;gap:0}
#timeline::-webkit-scrollbar{height:4px}
#timeline::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tl-event{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 10px;cursor:pointer;border-radius:8px;transition:background .2s;position:relative;min-width:64px}
.tl-event:hover{background:rgba(255,255,255,.05)}
.tl-event.active{background:rgba(240,192,64,.12)}
.tl-event .tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.tl-event .tl-year{font-size:11px;color:var(--accent);font-weight:600}
.tl-event .tl-name{font-size:11px;color:var(--text-dim);text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-line{flex-shrink:0;width:24px;height:1px;background:var(--border)}
.tl-line:last-child{display:none}

/* Info panel */
#info-panel{position:absolute;right:20px;top:100px;width:340px;max-height:calc(100vh - 200px);background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);z-index:100;overflow-y:auto;display:none;padding:20px}
#info-panel.show{display:block}
#info-panel::-webkit-scrollbar{width:4px}
#info-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#info-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px}
#info-close:hover{color:var(--text)}
#info-name{font-size:20px;font-weight:700;margin-bottom:4px}
#info-faction{display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px;margin-bottom:12px}
#info-desc{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
#info-relations h4{font-size:13px;color:var(--text);margin-bottom:8px}
.rel-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.rel-item:last-child{border-bottom:none}
.rel-target{color:var(--accent);cursor:pointer;font-weight:500}
.rel-target:hover{text-decoration:underline}
.rel-type{color:var(--text-dim);font-size:12px}

/* Path highlight card */
#path-card{position:absolute;left:50%;bottom:120px;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:12px;box-shadow:var(--shadow);z-index:100;padding:16px 22px;display:none;max-width:620px;max-height:340px;overflow-y:auto}
#path-card.show{display:block}
#path-card h4{font-size:14px;color:var(--accent);margin-bottom:8px}
#path-card .path-step{font-size:13px;padding:3px 0;color:var(--text)}
#path-card .path-relation{color:var(--text-dim)}
#path-card::-webkit-scrollbar{width:4px}
#path-card::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Modal overlay */
#modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#modal-overlay.show{display:flex}
#modal-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;max-width:440px;width:90%;box-shadow:var(--shadow);animation:slideUp .25s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#modal-card h2{font-size:20px;color:var(--text);margin-bottom:6px}
#modal-card p{font-size:13px;color:var(--text-dim);margin-bottom:20px}
#modal-card input{width:100%;padding:11px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none;margin-bottom:16px;transition:border-color .2s}
#modal-card input:focus{border-color:var(--accent)}
#modal-card .btn-row{display:flex;gap:10px}
#modal-card button{flex:1;padding:10px 0;border-radius:10px;font-size:14px;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--accent);color:#0f1119;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)!important}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim)}
#modal-card .api-hint{font-size:11px;color:var(--text-dim);margin-top:12px;text-align:center}

/* Loading overlay */
#loading-overlay{position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;backdrop-filter:blur(6px)}
#loading-overlay.show{display:flex}
#loading-progress-wrap{width:280px;max-width:80vw;text-align:center}
#loading-progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;position:relative}
#loading-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#f6d365);border-radius:3px;transition:width .5s ease;position:relative}
#loading-progress-fill::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#loading-stage{font-size:13px;color:var(--accent);margin-top:8px;min-height:1.4em}
#loading-text{color:var(--text);font-size:15px}
#loading-cancel{margin-top:8px;padding:8px 24px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:13px;cursor:pointer;transition:all .2s}
#loading-cancel:hover{color:var(--danger);border-color:var(--danger)}

/* Error toast */
#error-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:220;background:rgba(255,71,87,.15);border:1px solid var(--danger);color:var(--danger);padding:12px 24px;border-radius:10px;font-size:14px;display:none;max-width:500px;text-align:center;animation:slideUp .3s ease-out}

/* Responsive */
@media(max-width:1024px) and (min-width:769px){
  #info-panel{width:280px;right:12px;top:90px}
  #legend{gap:8px;font-size:11px}
  .legend-item{gap:3px}
}
@media(max-width:768px){
  #header{flex-wrap:wrap;gap:8px;padding:10px 12px}
  #logo{font-size:16px;order:0;flex:1}
  #search-wrap{order:2;flex:1 1 100%;max-width:100%}
  #legend{display:none}
  #generate-btn{font-size:12px;padding:5px 10px;order:1}
  #info-panel{right:0;left:0;width:auto;top:auto;bottom:0;max-height:50vh;border-radius:16px 16px 0 0;border-bottom:none;padding:16px 16px 24px;touch-action:pan-y}
  #info-panel::before{content:'';display:block;width:36px;height:4px;border-radius:2px;background:var(--border);margin:-8px auto 12px}
  #path-card{left:8px;right:8px;transform:none;bottom:100px;max-width:100%}
  #timeline{height:64px;padding:0 10px}
  .tl-event{min-width:52px;padding:4px 6px}
  .tl-event .tl-name{max-width:56px}
  #modal-card{padding:24px 20px}
}
@media(max-width:480px){
  #header{padding:8px 8px}
  #logo{font-size:14px}
  #search-input{font-size:13px;padding:8px 40px 8px 12px}
  #generate-btn{font-size:11px;padding:4px 8px}
  #voice-btn{width:28px;height:28px;font-size:15px}
  #info-panel{padding:12px 12px 20px}
  #info-name{font-size:17px}
  .tl-event{min-width:44px;padding:3px 4px}
  .tl-event .tl-name{font-size:10px;max-width:44px}
  .tl-event .tl-year{font-size:10px}
}

/* API Key settings */
#api-key-toggle{font-size:12px;color:var(--text-dim);cursor:pointer;text-align:center;margin-top:8px;user-select:none}
#api-key-toggle:hover{color:var(--accent)}
#api-key-row{display:none;margin-top:8px}
#api-key-row.show{display:block}
#api-key-input{width:100%;padding:9px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;outline:none;font-family:monospace;transition:border-color .2s}
#api-key-input:focus{border-color:var(--accent)}
.api-key-saved{font-size:11px;color:var(--text-dim);margin-top:4px}

/* History panel */
#history-toggle{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .2s;flex-shrink:0}
#history-toggle:hover{color:var(--accent);background:rgba(255,255,255,.05)}
#history-toggle.has-items{color:var(--accent)}
#history-panel{position:absolute;left:0;top:60px;width:220px;max-height:calc(100vh - 80px);background:var(--surface);border:1px solid var(--border);border-radius:0 12px 12px 0;z-index:90;padding:12px;overflow-y:auto;transform:translateX(-100%);transition:transform .25s ease;box-shadow:var(--shadow)}
#history-panel.show{transform:translateX(0)}
#history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#history-header span{font-size:14px;font-weight:600;color:var(--accent)}
#history-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:2px}
#history-close:hover{color:var(--text)}
#history-list{display:flex;flex-direction:column;gap:2px}
.history-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .2s}
.history-item:hover{background:rgba(255,255,255,.05)}
.history-item .hq{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);min-width:0}
.history-item .h-time{font-size:10px;color:var(--text-dim);white-space:nowrap;flex-shrink:0}
.history-del{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:10px;padding:2px 4px;border-radius:4px;flex-shrink:0}
.history-del:hover{color:var(--danger);background:rgba(255,71,87,.1)}
#history-clear{width:100%;padding:6px;margin-top:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .2s}
#history-clear:hover{color:var(--danger);border-color:var(--danger)}

/* Edit mode */
#edit-toggle{background:none;border:1px solid transparent;color:var(--text-dim);cursor:pointer;font-size:15px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
#edit-toggle:hover{color:var(--text);border-color:var(--border)}
#edit-toggle.active{color:var(--accent);border-color:var(--accent);background:rgba(240,192,64,.1)}
#graph-container.edit-mode{border:1px dashed var(--accent);border-radius:4px}
#save-layout-btn{position:absolute;left:20px;bottom:100px;z-index:90;padding:8px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--surface);color:var(--accent);font-size:13px;cursor:pointer;display:none;transition:all .2s;box-shadow:var(--shadow)}
#save-layout-btn:hover{background:rgba(240,192,64,.12)}
#save-layout-btn.show{display:block}

/* TTS button */
.tts-btn{background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:14px;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;vertical-align:middle;margin-left:6px}
.tts-btn:hover{color:var(--accent);border-color:var(--accent)}
.tts-btn.speaking{color:var(--accent);border-color:var(--accent);background:rgba(240,192,64,.1);animation:pulse 1.2s infinite}
</style>
</head>
<body>

<header id="header">
  <div id="logo">三国演义 · 人物谱</div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="试试：孙悟空的师傅是谁 · 刘备和曹操什么关系…">
    <button id="voice-btn" title="语音搜索">🎤</button>
  </div>
  <button id="history-toggle" title="搜索历史">📋</button>
  <button id="edit-toggle" title="编辑模式：拖拽调整节点位置">✏️</button>
  <div id="legend"></div>
  <button id="export-btn" title="导出图谱为图片">📷</button>
  <button id="generate-btn" title="输入任意小说名，AI 自动生成人物关系图谱">✨ 更换小说</button>
</header>

<div id="history-panel">
  <div id="history-header">
    <span>搜索历史</span>
    <button id="history-close">✕</button>
  </div>
  <div id="history-list"></div>
  <button id="history-clear">清空历史</button>
</div>

<div id="graph-container"></div>
<button id="save-layout-btn" title="保存当前节点布局">💾 保存布局</button>

<div id="info-panel">
  <button id="info-close">✕</button>
  <div id="info-name"></div>
  <span id="info-faction"></span>
  <p id="info-desc"></p>
  <div id="info-relations"><h4>人物关系</h4></div>
</div>

<div id="path-card">
  <h4>🔗 关系路径</h4>
  <div id="path-content"></div>
</div>

<nav id="timeline"></nav>

<!-- Generate Modal -->
<div id="modal-overlay">
  <div id="modal-card">
    <h2>生成人物关系图谱</h2>
    <p>输入任意小说名称，AI 将自动分析并生成人物关系网络</p>
    <input id="modal-input" type="text" placeholder="例如：红楼梦、哈利波特、百年孤独…">
    <div id="api-key-toggle">⚙️ 设置 API Key（跳过服务器，浏览器直连）</div>
    <div id="api-key-row">
      <input id="api-key-input" type="password" placeholder="粘贴你的 DeepSeek API Key（sk-…）">
      <div class="api-key-saved">Key 仅保存在当前浏览器会话中，关闭页面后自动清除</div>
    </div>
    <div class="btn-row">
      <button class="btn-ghost" id="modal-cancel">取消</button>
      <button class="btn-primary" id="modal-generate">⚡ 生成图谱</button>
    </div>
    <div class="api-hint">由 DeepSeek 驱动 · 约 10-30 秒</div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div id="loading-progress-wrap">
    <div id="loading-progress-bar"><div id="loading-progress-fill"></div></div>
    <div id="loading-stage">正在准备…</div>
  </div>
  <div id="loading-text">正在分析《三国演义》的人物关系…</div>
  <button id="loading-cancel">取消</button>
</div>

<!-- Error Toast -->
<div id="error-toast"></div>

<script>
// ===================== DEMO DATA: 三国演义 =====================
const DEMO_DATA = {
  novelName: '三国演义',
  factions: [
    { key:'shu',  name:'蜀汉',      color:'#e74c3c' },
    { key:'wei',  name:'曹魏',      color:'#3498db' },
    { key:'wu',   name:'东吴',      color:'#2ecc71' },
    { key:'han',  name:'群雄/汉室', color:'#9b59b6' },
    { key:'jin',  name:'西晋',      color:'#e67e22' },
  ],
  characters: [
    { id:'liubei',name:'刘备',faction:'shu',title:'汉昭烈帝',desc:'字玄德，蜀汉开国皇帝。以仁德闻名，与关羽张飞桃园结义，三顾茅庐请出诸葛亮，最终在成都称帝。'},
    { id:'guanyu',name:'关羽',faction:'shu',title:'汉寿亭侯',desc:'字云长，五虎上将之首。温酒斩华雄、过五关斩六将、水淹七军威震华夏，后大意失荆州被东吴所擒。'},
    { id:'zhangfei',name:'张飞',faction:'shu',title:'车骑将军',desc:'字翼德，五虎上将之一。长坂坡一声喝退曹军，粗中有细，后被部下范疆张达所害。'},
    { id:'zhugeliang',name:'诸葛亮',faction:'shu',title:'丞相·武乡侯',desc:'字孔明，号卧龙。隆中对策定三分天下，辅佐刘备成就帝业，后六出祁山北伐中原，病逝五丈原。'},
    { id:'zhaoyun',name:'赵云',faction:'shu',title:'镇军将军',desc:'字子龙，五虎上将之一。长坂坡七进七出救阿斗，一身是胆，汉水之战以寡敌众大破曹军。'},
    { id:'huangzhong',name:'黄忠',faction:'shu',title:'后将军',desc:'字汉升，五虎上将之一。定军山阵斩夏侯渊，老当益壮年逾七旬仍征战沙场。'},
    { id:'machao',name:'马超',faction:'shu',title:'骠骑将军',desc:'字孟起，五虎上将之一。西凉锦马超，渭水之战杀得曹操割须弃袍，后归降刘备镇守西境。'},
    { id:'jiangwei',name:'姜维',faction:'shu',title:'大将军',desc:'字伯约，诸葛亮弟子。继承北伐遗志九伐中原，蜀汉灭亡后试图复国事败身死。'},
    { id:'weiyan',name:'魏延',faction:'shu',title:'汉中太守',desc:'字文长，蜀汉大将。镇守汉中十余年，提出子午谷奇谋未被采纳，后因谋反罪名被杀。'},
    { id:'liushan',name:'刘禅',faction:'shu',title:'后主',desc:'字公嗣，刘备之子。在位四十年，宠信宦官黄皓，最终降魏，留下"乐不思蜀"的典故。'},

  physics: {

    forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.005, springLength: 160, springConstant: 0.04, damping: 0.5 },

  },

});

// ===================== HELPERS =====================
function edgeKey(a, b) { return [a, b].sort().join('--'); }

function factionBadgeStyle(factionKey) {
  const f = (currentData && currentData.factions || []).find(x => x.key === factionKey);
  const color = f ? f.color : '#666';
  return `background:${color}22;color:${color};display:inline-block;padding:2px 10px;border-radius:10px;font-size:12px`;
}

// ===================== LOAD DATA =====================
let abortController = null;

function loadNovelData(data) {
  currentData = data;
  charMap = {};
  adj = {};
  edgeByPair = {};
  allCharIds = [];
  outOfDataChars.clear();

  // 建立角色索引
  data.characters.forEach(c => {
    charMap[c.id] = c;
    charMap[c.name] = c;
    allCharIds.push(c.id);
  });

  // 建立邻接表 & 边索引
  data.relations.forEach(r => {
    if (!adj[r.from]) adj[r.from] = [];
    if (!adj[r.to]) adj[r.to] = [];
    adj[r.from].push(r.to);
    adj[r.to].push(r.from);
    edgeByPair[edgeKey(r.from, r.to)] = r;
  });

  // 重建 faction 色板 → vis.js groups
  const groups = {};
  (data.factions || []).forEach(f => {
    groups[f.key] = { color: { background: f.color } };
  });
  network.setOptions({ groups });

  // 重建 nodes
  nodes.clear();
  nodes.add(data.characters.map(c => {
    const f = (data.factions || []).find(x => x.key === c.faction);
    const bg = f ? f.color : '#666';
    return {
      id: c.id,
      label: c.name,
      group: c.faction,
      title: `<b>${c.name}</b><br>${c.title || ''}<br><i>${f ? f.name : c.faction}</i>`,
      color: { background: bg, border: '#fff', highlight: { background: bg, border: '#f0c040' } },
      font: { color: '#e0e0e0', size: 13, strokeWidth: 2, strokeColor: '#0f1119' },
      shape: 'dot', size: 28, borderWidth: 2,
    };
  }));

  // 重建 edges
  edges.clear();
  edges.add(data.relations.map(r => ({
    from: r.from, to: r.to, label: r.type,
    dashes: r.style === 'dashed' ? [8, 4] : (r.style === 'dotted' ? [3, 3] : false),
    color: { color: r.style === 'dashed' ? '#555' : '#888', hover: '#f0c040' },
    font: { color: '#666', size: 10, strokeWidth: 2, strokeColor: '#0f1119' },
    width: r.style === 'solid' ? 1.5 : 1,
    smooth: { type: 'continuous' },
    arrows: { to: { enabled: r.style === 'dashed', scaleFactor: 0.5 } },
  })));

  // 更新 UI
  logo.textContent = (data.novelName || '未知小说') + ' · 人物谱';
  document.title = (data.novelName || '小说') + ' · 人物关系图谱';
  rebuildLegend();
  buildTimeline();
  closeAllPanels();

  network.once('stabilizationIterationsDone', function() {
    network.fit({ animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
    loadSavedLayout();
  });
  network.stabilize(100);
}

// ===================== SEARCH HISTORY =====================
let historyEnabled = true;

function getSearchHistory() {
  try { return JSON.parse(localStorage.getItem('search_history') || '[]'); } catch { return []; }
}

function saveSearchHistory(arr) {
  localStorage.setItem('search_history', JSON.stringify(arr.slice(0, 20)));
  if (arr.length > 0) historyToggle.classList.add('has-items');
  else historyToggle.classList.remove('has-items');
}

function addSearchHistory(query) {
  if (!historyEnabled) return;
  const arr = getSearchHistory();
  // Remove duplicate if exists
  const existingIdx = arr.findIndex(item => item.query === query);
  if (existingIdx !== -1) arr.splice(existingIdx, 1);
  arr.unshift({ query, timestamp: Date.now(), novelName: currentData?.novelName || '' });
  saveSearchHistory(arr);
  renderSearchHistory();
}

function deleteSearchHistory(index) {
  const arr = getSearchHistory();
  arr.splice(index, 1);
  saveSearchHistory(arr);
  renderSearchHistory();
}

function clearSearchHistory() {
  localStorage.removeItem('search_history');
  renderSearchHistory();
  historyToggle.classList.remove('has-items');
}

function renderSearchHistory() {
  const arr = getSearchHistory();
  if (arr.length === 0) {
    historyList.innerHTML = '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:12px">暂无搜索记录</div>';
    return;
  }
  historyList.innerHTML = arr.map((item, i) => {
    const d = new Date(item.timestamp);
    const timeStr = String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    return `<div class="history-item" data-idx="${i}">
      <span class="hq" title="${item.query.replace(/"/g,'&quot;')}">${item.query}</span>
      <span class="h-time">${timeStr}</span>
      <button class="history-del" data-idx="${i}" title="删除">✕</button>
    </div>`;
  }).join('');
  historyList.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.history-del')) return;
      const idx = parseInt(this.dataset.idx);
      const arr = getSearchHistory();
      if (arr[idx]) {
        closeAllPanels();
        searchInput.value = arr[idx].query;
        searchRelations(arr[idx].query);
        historyPanel.classList.remove('show');
      }
    });
  });
  historyList.querySelectorAll('.history-del').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteSearchHistory(parseInt(this.dataset.idx));
    });
  });
}

// ===================== SEARCH =====================
function findBFS(startId, endId) {
  if (startId === endId) return [startId];
  const queue = [[startId]];
  const visited = new Set([startId]);
  while (queue.length > 0) {
    const path = queue.shift();
    const current = path[path.length - 1];
    const neighbors = adj[current] || [];
    for (const n of neighbors) {
      if (n === endId) return [...path, n];
      if (!visited.has(n)) {
        visited.add(n);
        queue.push([...path, n]);
      }
    }
  }
  return null;
}

// ── 模糊找角色（支持部分名、字号、别称） ──
function fuzzyFindChar(name) {
  name = name.trim();
  if (!name) return null;
  for (const c of (currentData && currentData.characters || [])) {
    if (c.name === name || c.name.includes(name) || (c.title || '').includes(name) || c.id.includes(name)) return c;
  }
  // 去掉末尾的"的"、"之"等虚词再试
  const cleaned = name.replace(/[的之]$/, '');
  if (cleaned !== name) return fuzzyFindChar(cleaned);
  return null;
}

// ── 自然语言问答解析 ──
const NL_PATTERNS = [
  // "X的师傅/师父/老师是谁"  → find X's teacher
  { regex: /^(.+?)的(师傅|师父|老师|导师|恩师)\s*是?谁/, rel: '师' },
  // "X的徒弟/学生/弟子/门生是谁" → find X's students
  { regex: /^(.+?)的(徒弟|学生|弟子|门生|传人)\s*是?谁/, rel: '徒' },
  // "X的父亲/爸爸/爹/母亲/妈妈/娘是谁"
  { regex: /^(.+?)的(父亲|爸爸|爹|母亲|妈妈|娘|父|母)\s*是?谁/, rel: '亲' },
  // "X的儿子/女儿/孩子/子女是谁"
  { regex: /^(.+?)的(儿子|女儿|孩子|子女|子嗣)\s*是?谁/, rel: '子' },
  // "X的兄弟/哥哥/弟弟/姐妹/姐姐/妹妹是谁"
  { regex: /^(.+?)的(兄弟|哥哥|弟弟|姐姐|妹妹|姐妹|兄长|手足)\s*是?谁/, rel: '兄' },
  // "X的丈夫/妻子/老婆/老公/爱人是谁"
  { regex: /^(.+?)的(丈夫|妻子|老婆|老公|爱人|配偶)\s*是?谁/, rel: '偶' },
  // "X的主公/上司/领导/主子是谁"
  { regex: /^(.+?)的(主公|上司|领导|主子|君主|头领|大王)\s*是?谁/, rel: '君' },
  // "谁杀了/害了/灭了/干掉了 X"
  { regex: /^谁(杀了|害了|灭了|干掉了|弄死了|做了)(.+)/, rel: '杀' },
  // "X被谁(杀了|害了|灭了)"
  { regex: /^(.+?)被谁(杀了|害了|灭了|打败了)/, rel: '杀' },
  // "X和Y是什么关系" → 两角色间路径
  { regex: /^(.+?)[和与](.+?)是什么关系/, rel: 'path' },
  // "X和Y什么关系"
  { regex: /^(.+?)[和与](.+?)(的|什么)?关?系/, rel: 'path' },
  // 兜底: "X是谁"
  { regex: /^(.+?)是谁[？?]?$/, rel: 'who' },
];

function parseNaturalQuery(query) {
  for (const { regex, rel } of NL_PATTERNS) {
    const m = query.match(regex);
    if (!m) continue;

    if (rel === 'path') {
      const a = fuzzyFindChar(m[1]), b = fuzzyFindChar(m[2]);
      if (a && b) return { type: 'path', chars: [a, b] };
      if (a || b) return { type: 'single', char: a || b };
      return null;
    }

    // 关系类问题：提取角色名，然后按关系类型搜索边
    let charName;
    if (rel === '杀' && m[2]) charName = m[2]; // "谁杀了X"
    else if (rel === '杀' && m[1]) charName = m[1]; // "X被谁杀了"
    else charName = m[1];

    const char = fuzzyFindChar(charName);
    if (!char) continue;

    return { type: 'relation', char, relHint: rel, rawGroups: m };
  }
  return null;
}

// ── 根据关系提示词搜索相关边 ──
function findRelatedChars(charId, relHint) {
  const rels = (currentData && currentData.relations || []);
  const results = [];

  const hintMap = {
    '师': ['师', '徒', '教', '授', '学'],
    '徒': ['徒', '学', '弟', '生'],
    '亲': ['父', '母', '子', '女', '亲', '爸', '妈', '娘', '爹'],
    '子': ['子', '女', '儿', '孩', '后'],
    '兄': ['兄', '弟', '姐', '妹', '手足'],
    '偶': ['妻', '夫', '配', '偶', '爱', '情', '侣'],
    '君': ['君', '主', '臣', '上', '下', '忠', '事'],
    '杀': ['杀', '害', '灭', '死', '仇', '敌', '斩'],
  };

  const keywords = hintMap[relHint] || [];

  for (const r of rels) {
    if (r.from === charId || r.to === charId) {
      const otherId = r.from === charId ? r.to : r.from;
      const other = charMap[otherId];
      if (!other) continue;

      // 匹配关系类型中的关键词
      if (keywords.some(kw => r.type.includes(kw))) {
        results.push({ character: other, relation: r, direction: r.from === charId ? 'out' : 'in' });
      }
    }
  }

  // 如果没有关键词匹配，返回所有关联角色
  if (results.length === 0) {
    for (const r of rels) {
      if (r.from === charId || r.to === charId) {
        const otherId = r.from === charId ? r.to : r.from;
        const other = charMap[otherId];
        if (other) results.push({ character: other, relation: r, direction: r.from === charId ? 'out' : 'in' });
      }
    }
  }

  return results;
}

// ── LLM 智能搜索：复杂关系问题交给 AI ──
async function callLLMSearch(query) {
  const chars = (currentData && currentData.characters || []);
  const rels = (currentData && currentData.relations || []);
  const directKey = apiKeyInput.value.trim();

  const slimChars = chars.map(c => ({ id: c.id, name: c.name, faction: c.faction, title: c.title || '', desc: (c.desc || '').slice(0, 60) }));
  const slimRels = rels.map(r => ({ from: r.from, to: r.to, type: r.type }));

  const body = JSON.stringify({ query, characters: slimChars, relations: slimRels });

  // 优先走服务器
  try {
    const resp = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
      signal: (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) ? AbortSignal.timeout(15000) : undefined,
    });
    if (resp.ok) {
      const data = await resp.json();
      if (data && data.found) return data;
      return null;
    }
    // 如果服务器返回"未配置 API Key"，且有直连 Key，走直连
    if (resp.status === 503 && directKey) throw new Error('server-no-key');
  } catch (err) {
    if (err.message === 'server-no-key' || err.name === 'TypeError' || err.message.includes('fetch')) {
      // 服务器不可达，尝试直连
    } else {
      return null;
    }
  }

  // 备选：浏览器直连 DeepSeek
  if (!directKey) return null;

  try {
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${directKey}`,
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 512,
        temperature: 0.1,
        messages: [
          { role: 'system', content: 'You are a character relationship search engine. Given character list, relation list, and a natural-language question, answer in JSON only: {"found":true,"answer":"中文回答","highlightIds":["id1","id2"],"pathIds":["id1","id3","id2"]}. If not relevant, return {"found":false}.' },
          { role: 'user', content: `Characters:\n${JSON.stringify(slimChars)}\n\nRelations:\n${JSON.stringify(slimRels)}\n\nQuestion: ${query}` },
        ],
      }),
    });

    if (!resp.ok) return null;
    const json = await resp.json();
    const raw = json.choices?.[0]?.message?.content || '';
    try {
      const data = extractJSON(raw);
      return (data && data.found) ? data : null;
    } catch (_) { return null; }
  } catch (_) {
    return null;
  }
}

// ── 判断是否像自然语言问题 ──
function looksLikeQuestion(query) {
  const qPatterns = [/是谁/, /什么关系/, /有没有/, /哪.*关系/, /谁.*了/, /怎么.*的/, /为什么/, /啥关系/, /有关系/, /认识/, /跟.*什么/];
  return qPatterns.some(p => p.test(query)) || query.length > 8 || query.includes('？') || query.includes('?');
}

function searchRelations(query) {
  infoPanel.classList.remove('show');
  pathCard.classList.remove('show');
  network.selectNodes([]);
  resetNodeOpacity();
  addSearchHistory(query);

  // ── 第一步：尝试自然语言问答 ──
  const nl = parseNaturalQuery(query);

  if (nl) {
    if (nl.type === 'path') {
      const a = nl.chars[0], b = nl.chars[1];
      const path = findBFS(a.id, b.id);
      const factions = currentData && currentData.factions || [];

      if (!path) {
        pathContent.innerHTML = `<span style="color:var(--text-dim)">未找到"${a.name}"与"${b.name}"之间的关联路径</span>`;
        pathCard.classList.add('show');
        return;
      }
      let html = `<div style="font-size:15px;color:var(--text);margin-bottom:8px">📖 ${a.name} 与 ${b.name} 的关系路径</div>`;
      for (let i = 0; i < path.length; i++) {
        const ch = charMap[path[i]];
        if (!ch) { outOfDataChars.add(path[i]); continue; }
        const tf = factions.find(x => x.key === ch.faction);
        html += `<div class="path-step"><span class="legend-dot" style="background:${tf?tf.color:'#666'};width:10px;height:10px;display:inline-block;border-radius:50%"></span> <b style="color:#f0c040;cursor:pointer" data-char="${ch.id}">${ch.name}</b> <span style="color:var(--text-dim);font-size:11px">${tf?tf.name:ch.faction}</span></div>`;
        if (i < path.length - 1) {
          const e = edgeByPair[edgeKey(path[i], path[i+1])];
          html += `<div class="path-relation">  ↳ ${e ? e.type : '关联'}  ↴</div>`;
        }
      }
      pathContent.innerHTML = html + '<div style="font-size:12px;color:var(--text-dim);margin-top:8px" id="explain-loading">🤔 分析关系…</div>';
      pathContent.querySelectorAll('[data-char]').forEach(el => el.addEventListener('click', () => showCharacter(el.dataset.char)));
      pathCard.classList.add('show');
      const validPath = path.filter(id => !outOfDataChars.has(id));
      network.selectNodes(validPath);
      network.fit({ nodes: validPath, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });

      // ── 异步获取 AI 关系解释 ──
      (async () => {
        const rels = [];
        for (let i = 0; i < path.length - 1; i++) {
          const ek = edgeKey(path[i], path[i+1]);
          const e = edgeByPair[ek];
          if (e && charMap[path[i]] && charMap[path[i+1]]) {
            rels.push({ aName: charMap[path[i]].name, bName: charMap[path[i+1]].name, type: e.type });
          }
        }
        if (rels.length === 0) return;

        const nov = (currentData && currentData.novelName) || '未知';
        let expText = '';

        try {
          const resp = await fetch('/api/explain-path', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ charA: a, charB: b, relations: rels, novelName: nov }),
          });
          if (resp.ok) { const d = await resp.json(); expText = d.explanation || ''; }
        } catch (_) {}

        if (!expText) {
          const dk = apiKeyInput.value.trim();
          if (dk) {
            try {
              const relSummary = rels.map(r => `${r.aName} -[${r.type}]-> ${r.bName}`).join('; ');
              const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${dk}` },
                body: JSON.stringify({
                  model: 'deepseek-chat', max_tokens: 256, temperature: 0.3,
                  messages: [
                    { role: 'system', content: '用1-2句中文回答人物关系，简洁直接。' },
                    { role: 'user', content: `小说《${nov}》中，${a.name}和${b.name}的关系链：${relSummary}。一句话概括他们的关系。` },
                  ],
                }),
              });
              if (resp.ok) { const j = await resp.json(); expText = j.choices?.[0]?.message?.content || ''; }
            } catch (_) {}
          }
        }

        const el = document.getElementById('explain-loading');
        if (el) {
          if (expText) {
            el.innerHTML = `💡 <span style="color:var(--accent)">${expText}</span> <button class="tts-btn" title="朗读解释">🔊</button>`;
            const ttsBtn = el.querySelector('.tts-btn');
            if (ttsBtn && window.speechSynthesis) {
              ttsBtn.addEventListener('click', function() { speakExplanation(expText, this); });
            } else if (ttsBtn) {
              ttsBtn.style.display = 'none';
            }
          } else {
            el.innerHTML = `<span style="color:var(--text-dim)">(关系路径如上所示)</span>`;
          }
        }
      })();
      return;
    }

    if (nl.type === 'single') {
      showCharacter(nl.char.id);
      return;
    }

    if (nl.type === 'relation') {
      const results = findRelatedChars(nl.char.id, nl.relHint);
      const factions = currentData && currentData.factions || [];

      if (results.length === 0) {
        // 本地没找到，先退回 LLM 搜索
      } else {
        const tf = factions.find(x => x.key === nl.char.faction);
        let html = `<div style="font-size:15px;color:var(--text);margin-bottom:6px">📖 ${nl.char.name} <span style="color:var(--text-dim);font-size:12px">${tf?tf.name:''}</span></div>`;

        if (results.length === 1) {
          const r = results[0];
          html += `<div style="font-size:16px;color:var(--accent);margin-bottom:4px">→ ${r.character.name}</div>`;
          html += `<div style="font-size:13px;color:var(--text-dim)">关系：${r.relation.type}</div>`;
        } else {
          html += `<div style="font-size:13px;color:var(--text-dim);margin-bottom:6px">找到 ${results.length} 个关联：</div>`;
          results.forEach(r => {
            const tf2 = factions.find(x => x.key === r.character.faction);
            html += `<div class="path-step"><span class="legend-dot" style="background:${tf2?tf2.color:'#666'};width:8px;height:8px;display:inline-block;border-radius:50%"></span> <b style="color:#f0c040;cursor:pointer" data-char="${r.character.id}">${r.character.name}</b> <span style="color:var(--text-dim);font-size:11px">${r.relation.type}</span></div>`;
          });
        }

        pathContent.innerHTML = html;
        pathContent.querySelectorAll('[data-char]').forEach(el => el.addEventListener('click', () => showCharacter(el.dataset.char)));
        pathCard.classList.add('show');

        const highlightIds = [nl.char.id, ...results.map(r => r.character.id)];
        highlightEventChars(highlightIds);
        network.selectNodes(highlightIds);
        network.fit({ nodes: highlightIds, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
        return;
      }
    }
  }

  // ── 第二步：按角色名称直接匹配（原有逻辑） ──
  const foundChars = [];
  for (const c of (currentData && currentData.characters || [])) {
    if (query.includes(c.name)) foundChars.push(c);
  }

  if (foundChars.length === 0) {
    const match = fuzzyFindChar(query);
    if (match) return showCharacter(match.id);

    // ── 第三步：本地全失败 → LLM 智能搜索 ──
    if (looksLikeQuestion(query)) {
      pathContent.innerHTML = `<div style="text-align:center;padding:12px"><span style="color:var(--text-dim);font-size:14px">🤔 AI 正在理解你的问题…</span></div>`;
      pathCard.classList.add('show');

      callLLMSearch(query).then(data => {
        if (!data || !data.found || !data.highlightIds || data.highlightIds.length === 0) {
          pathContent.innerHTML = `<span style="color:var(--text-dim)">未能解析这个问题，试试换个问法？</span>`;
          pathCard.classList.add('show');
          return;
        }

        // 过滤有效的 ID
        const validIds = data.highlightIds.filter(id => charMap[id]);
        const factions = currentData && currentData.factions || [];

        let html = `<div style="font-size:15px;color:var(--accent);margin-bottom:8px">💡 ${data.answer || ''}</div>`;

        if (data.pathIds && data.pathIds.length >= 2) {
          // 显示路径
          const validPath = data.pathIds.filter(id => charMap[id]);
          for (let i = 0; i < validPath.length; i++) {
            const ch = charMap[validPath[i]];
            if (!ch) continue;
            const tf = factions.find(x => x.key === ch.faction);
            html += `<div class="path-step"><span class="legend-dot" style="background:${tf?tf.color:'#666'};width:10px;height:10px;display:inline-block;border-radius:50%"></span> <b style="color:#f0c040;cursor:pointer" data-char="${ch.id}">${ch.name}</b> <span style="color:var(--text-dim);font-size:11px">${tf?tf.name:ch.faction}</span></div>`;
            if (i < validPath.length - 1) {
              const ek = edgeKey(validPath[i], validPath[i+1]);
              const e = edgeByPair[ek];
              html += `<div class="path-relation">  ↳ ${e ? e.type : '关联'}  ↴</div>`;
            }
          }
        } else if (validIds.length > 0) {
          html += `<div style="font-size:13px;color:var(--text-dim);margin-top:6px">相关人物：`;
          validIds.forEach(id => {
            const ch = charMap[id];
            const tf = factions.find(x => x.key === ch.faction);
            html += `<span style="color:#f0c040;cursor:pointer;margin:0 4px" data-char="${ch.id}">${ch.name}</span>`;
          });
          html += `</div>`;
        }

        pathContent.innerHTML = html;
        pathContent.querySelectorAll('[data-char]').forEach(el => el.addEventListener('click', () => showCharacter(el.dataset.char)));
        pathCard.classList.add('show');

        if (validIds.length > 0) {
          highlightEventChars(validIds);
          network.selectNodes(validIds);
          network.fit({ nodes: validIds, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
        }
      }).catch(() => {
        pathContent.innerHTML = `<span style="color:var(--text-dim)">AI 搜索暂不可用，试试输入角色名字直接查找</span>`;
        pathCard.classList.add('show');
      });
    }
    return;
  }

  if (foundChars.length === 1) {
    showCharacter(foundChars[0].id);
    return;
  }

  const a = foundChars[0], b = foundChars[1];
  const path = findBFS(a.id, b.id);
  const factions = currentData && currentData.factions || [];

  if (!path) {
    pathContent.innerHTML = `<span style="color:var(--text-dim)">未找到"${a.name}"与"${b.name}"之间的关联路径</span>`;
    pathCard.classList.add('show');
    return;
  }

  let html = '';
  for (let i = 0; i < path.length; i++) {
    const ch = charMap[path[i]];
    if (!ch) { outOfDataChars.add(path[i]); continue; }
    const tf = factions.find(x => x.key === ch.faction);
    html += `<div class="path-step"><span class="legend-dot" style="background:${tf?tf.color:'#666'};width:10px;height:10px;display:inline-block;border-radius:50%"></span> <b style="color:#f0c040;cursor:pointer" data-char="${ch.id}">${ch.name}</b> <span style="color:var(--text-dim);font-size:11px">${tf?tf.name:ch.faction}</span></div>`;
    if (i < path.length - 1) {
      const e = edgeByPair[edgeKey(path[i], path[i+1])];
      html += `<div class="path-relation">  ↳ ${e ? e.type : '关联'}  ↴</div>`;
    }
  }
  pathContent.innerHTML = html;
  pathContent.querySelectorAll('[data-char]').forEach(el => {
    el.addEventListener('click', () => showCharacter(el.dataset.char));
  });
  pathCard.classList.add('show');
  network.selectNodes(path.filter(id => !outOfDataChars.has(id)));
  network.fit({ nodes: path.filter(id => !outOfDataChars.has(id)), animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
}

function highlightEventChars(charIds) {
  const relatedSet = new Set(charIds);
  const nodeUpdates = allCharIds.map(id => ({
    id,
    opacity: relatedSet.has(id) ? 1.0 : 0.12,
    font: { color: relatedSet.has(id) ? '#e0e0e0' : 'rgba(224,224,224,0.12)', size: relatedSet.has(id) ? 13 : 11, strokeWidth: 2, strokeColor: '#0f1119' }
  }));
  nodes.update(nodeUpdates);

  const allEdges = edges.get();
  const edgeUpdates = allEdges.map(e => {
    const bothRelated = relatedSet.has(e.from) && relatedSet.has(e.to);
    if (bothRelated) {
      return { id: e.id, color: { color: '#ccc', hover: '#f0c040' }, width: e.width || 1.5, font: { color: '#999', size: 10, strokeWidth: 2, strokeColor: '#0f1119' } };
    } else {
      return { id: e.id, color: { color: 'rgba(136,136,136,0.08)', hover: 'rgba(240,192,64,0.3)' }, width: 0.3, font: { color: 'rgba(102,102,102,0.08)', size: 10, strokeWidth: 2, strokeColor: '#0f1119' } };
    }
  });
  edges.update(edgeUpdates);
}

function resetNodeOpacity() {
  const nodeUpdates = allCharIds.map(id => ({
    id, opacity: 1.0,
    font: { color: '#e0e0e0', size: 13, strokeWidth: 2, strokeColor: '#0f1119' }
  }));
  nodes.update(nodeUpdates);

  const allEdges = edges.get();
  const edgeUpdates = allEdges.map(e => ({
    id: e.id,
    color: { color: e.dashes ? '#555' : '#888', hover: '#f0c040' },
    width: e.dashes ? 1 : 1.5,
    font: { color: '#666', size: 10, strokeWidth: 2, strokeColor: '#0f1119' }
  }));
  edges.update(edgeUpdates);
}

function buildTimeline() {
  const evts = (currentData && currentData.events) || [];
  if (evts.length === 0) { timelineEl.innerHTML = ''; return; }

  let html = '';
  evts.forEach((evt, i) => {
    html += `<div class="tl-event" data-event="${i}">
      <span class="tl-dot"></span>
      <span class="tl-year">${evt.year != null ? evt.year : '—'}</span>
      <span class="tl-name">${evt.name}</span>
    </div>`;
    html += '<div class="tl-line"></div>';
  });
  timelineEl.innerHTML = html;

  timelineEl.querySelectorAll('.tl-event').forEach(el => {
    el.addEventListener('click', function() {
      const idx = parseInt(this.dataset.event);
      const evt = evts[idx];
      const wasActive = this.classList.contains('active');
      timelineEl.querySelectorAll('.tl-event').forEach(e => e.classList.remove('active'));
      if (wasActive) {
        network.selectNodes([]);
        network.fit({ animation: { duration: 500 } });
        resetNodeOpacity();
        pathCard.classList.remove('show');
        return;
      }
      this.classList.add('active');
      const validChars = (evt.chars || []).filter(id => charMap[id]);
      if (validChars.length > 0) {
        highlightEventChars(validChars);
        network.selectNodes(validChars);
        network.fit({ nodes: validChars, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
      }
      pathContent.innerHTML = `
        <div style="font-size:18px;color:var(--accent);margin-bottom:4px">${evt.name} <span style="font-size:13px;color:var(--text-dim)">${evt.year != null ? '· ' + evt.year + '年' : ''}</span></div>
        <div style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:10px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:2px solid var(--accent)">${evt.summary || ''}</div>
        <div style="font-size:13px;color:var(--text)">相关人物：${(evt.chars||[]).map(id => {
          const c = charMap[id];
          return c ? `<span style="color:#f0c040;cursor:pointer" data-char="${c.id}">${c.name}</span>` : '';
        }).join('、')}</div>
      `;
      pathCard.classList.add('show');
      pathContent.querySelectorAll('[data-char]').forEach(el => {
        el.addEventListener('click', () => showCharacter(el.dataset.char));
      });
    });
  });
}

// LLM 系统提示词（与 server.js 保持一致）
const SYSTEM_PROMPT = `You are a literary analyst. Output a character graph in STRICT JSON with Chinese text fields:

{
  "novelName":"书名",
  "characters":[{"id":"pinyin-kebab","name":"角色名","faction":"阵营key","title":"身份","desc":"一句话描述"}],
  "factions":[{"key":"阵营key","name":"阵营名","color":"#hex"}],
  "relations":[{"from":"id","to":"id","type":"关系类型","style":"solid|dashed|dotted"}],
  "events":[{"year":数字或null,"name":"事件名","chars":["id"],"summary":"概述"}]
}

Rules:
- 20-35 characters, 3-6 factions (assign distinct #hex colors), 30-60 relations, 8-14 events
- solid=family/ally/loyalty, dashed=rivary/enemy/betrayal, dotted=mentor/former/indirect
- All text in Chinese, ids in pinyin-kebab
- No markdown fences, raw JSON only`;

// 辅助：从 LLM 文本响应中提取 JSON
function extractJSON(text) {
  try { return JSON.parse(text); } catch (_) {}
  const fence = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) { try { return JSON.parse(fence[1].trim()); } catch (_) {} }
  const firstBrace = text.indexOf('{');
  const lastBrace = text.lastIndexOf('}');
  if (firstBrace !== -1 && lastBrace > firstBrace) {
    try { return JSON.parse(text.slice(firstBrace, lastBrace + 1)); } catch (_) {}
  }
  return null;
}

// 直接调用 DeepSeek API（无需服务器）
async function callDeepSeekDirect(novelName, apiKey) {
  const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      max_tokens: 8192,
      temperature: 0.7,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: `请生成小说《${novelName}》的人物关系图谱。` },
      ],
    }),
  });

  if (!resp.ok) {
    const errBody = await resp.json().catch(() => ({}));
    if (resp.status === 401) throw new Error('API Key 无效，请检查后重试');
    if (resp.status === 429) throw new Error('API 请求过于频繁，请稍后重试');
    throw new Error(errBody.error?.message || `API 错误（${resp.status}）`);
  }

  const json = await resp.json();
  const rawText = json.choices?.[0]?.message?.content || '';

  const data = extractJSON(rawText);
  if (!data) throw new Error('AI 返回格式异常，请重试');
  if (!data.factions) data.factions = [];
  const palette = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#e67e22','#1abc9c','#f39c12','#e91e63'];
  data.factions.forEach((f, i) => { if (!f.color) f.color = palette[i % palette.length]; });
  return data;
}

async function generateNovel(novelName) {
  // ── 先查浏览器缓存 ──
  const cacheKey = 'novel_' + novelName.trim();
  try {
    const cached = sessionStorage.getItem(cacheKey);
    if (cached) {
      const data = JSON.parse(cached);
      console.log(`📦 浏览器缓存命中：「${novelName}」`);
      loadNovelData(data);
      return;
    }
  } catch (_) {}

  showLoading(novelName);
  updateProgress(5, '正在查询缓存…');
  abortController = new AbortController();
  const signal = abortController.signal;
  const directKey = apiKeyInput.value.trim();

  // 策略：优先走服务器代理；如果设置了 API Key 则直连作为备选
  try {
    updateProgress(15, '正在请求 AI 引擎…');
    // 尝试服务器代理
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ novelName }),
      signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `服务器错误（${resp.status}）`);
    }

    const data = await resp.json();
    if (!data.characters || data.characters.length === 0) {
      throw new Error('AI 未能识别出该小说的人物信息，请尝试更知名的小说');
    }

    updateProgress(70, '数据已就绪，正在构建图谱…');
    loadNovelData(data);
    try { sessionStorage.setItem(cacheKey, JSON.stringify(data)); } catch (_) {}
    hideLoading();
    console.log(`✅ 加载完成：${data.characters.length} 人物 · ${data.relations.length} 关系 · ${data.events.length} 事件`);
  } catch (err) {
    if (err.name === 'AbortError') { hideLoading(); return; }

    // 如果服务器不可达且有直连 Key，尝试浏览器直连
    const isNetworkError = err.message.includes('Failed to fetch') || err.message.includes('NetworkError');
    if (isNetworkError && directKey) {
      console.log('🔄 服务器不可达，尝试浏览器直连 DeepSeek API…');
      updateProgress(20, '正在通过浏览器直连 DeepSeek…');
      try {
        const data = await callDeepSeekDirect(novelName, directKey);
        if (!data.characters || data.characters.length === 0) {
          throw new Error('AI 未能识别出该小说的人物信息，请尝试更知名的小说');
        }
        // 保存 API Key 到当前会话
        sessionStorage.setItem('deepseek_api_key', directKey);
        updateProgress(70, '数据已就绪，正在构建图谱…');
        loadNovelData(data);
        hideLoading();
        console.log(`✅ 直连加载完成：${data.characters.length} 人物 · ${data.relations.length} 关系 · ${data.events.length} 事件`);
        return;
      } catch (directErr) {
        hideLoading();
        if (directErr.name === 'AbortError') return;
        showError(directErr.message);
        return;
      }
    }

    hideLoading();
    if (isNetworkError) {
      showError('无法连接到服务器。你可以：\n1. 运行 node server.js 启动本地服务\n2. 或在上方输入 DeepSeek API Key 后重试（浏览器直连）');
    } else {
      showError(err.message);
    }
  }
}

function saveLayout() {
  if (!currentData) return;
  const positions = network.getPositions();
  const layoutKey = 'layout_' + (currentData.novelName || 'unknown');
  // Only save positions for known character IDs
  const validPositions = {};
  currentData.characters.forEach(c => {
    if (positions[c.id]) validPositions[c.id] = positions[c.id];
  });
  try {
    localStorage.setItem(layoutKey, JSON.stringify(validPositions));
  } catch (_) {}
  // Flash feedback
  saveLayoutBtn.textContent = '✅ 已保存';
  setTimeout(() => { saveLayoutBtn.textContent = '💾 保存布局'; }, 1500);
}

function loadSavedLayout() {
  if (!currentData) return;
  const layoutKey = 'layout_' + (currentData.novelName || 'unknown');
  try {
    const saved = localStorage.getItem(layoutKey);
    if (!saved) return;
    const positions = JSON.parse(saved);
    const valid = {};
    currentData.characters.forEach(c => {
      if (positions[c.id] && typeof positions[c.id].x === 'number') {
        valid[c.id] = { x: positions[c.id].x, y: positions[c.id].y };
      }
    });
    const keys = Object.keys(valid);
    if (keys.length > 0) {
      // Apply after a short delay to let the network initialize
      setTimeout(() => {
        network.moveNode(valid);
        network.fit({ animation: { duration: 300 } });
      }, 100);
    }
  } catch (_) {}
}

editToggle.addEventListener('click', toggleEditMode);
saveLayoutBtn.addEventListener('click', saveLayout);

// ===================== TTS =====================
function speakExplanation(text, btn) {
  if (!window.speechSynthesis) return;
  if (btn.classList.contains('speaking')) {
    window.speechSynthesis.cancel();
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    return;
  }
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 1.0;
  utterance.pitch = 1.0;
  utterance.onend = () => {
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
  };
  utterance.onerror = () => {
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
  };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
  btn.classList.add('speaking');
  btn.textContent = '🔇';
}
